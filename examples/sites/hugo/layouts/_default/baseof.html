<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
  {{ partial "alap-head.html" . }}
</head>
<body>
  <p><a href="../../">&larr; All Examples</a></p>
  <h1>{{ .Title }}</h1>
  <nav>
    <a href="{{ "/" | relURL }}"{{ if eq .RelPermalink "/" }} class="active"{{ end }}>Guide</a>
    <a href="{{ "/bridges/" | relURL }}"{{ if eq .RelPermalink "/bridges/" }} class="active"{{ end }}>Bridges</a>
    <a href="{{ "/food/" | relURL }}"{{ if eq .RelPermalink "/food/" }} class="active"{{ end }}>Food</a>
    <a href="{{ "/how-it-works/" | relURL }}"{{ if eq .RelPermalink "/how-it-works/" }} class="active"{{ end }}>How It Works</a>
  </nav>
  {{ block "main" . }}{{ end }}

  <script>
    document.querySelectorAll('.source').forEach(function(source) {
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', function() {
        var code = source.querySelector('code');
        navigator.clipboard.writeText(code.textContent).then(function() {
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
        });
      });
      source.appendChild(btn);
    });
  </script>
</body>
</html>
